<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Golden Ratio Camera Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background-color: #000; overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation;
        }

        .app-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            background: #000;
        }

        #view-finder {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            overflow: hidden; transition: width 0.3s ease, height 0.3s ease;
            background: #111; width: 100%; height: 100%;
        }

        #camera-feed {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }

        .overlay-layer {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; z-index: 10; pointer-events: none;
        }

        .controls-layer {
            position: absolute; top: 0; left: 0; z-index: 20;
            width: 100%; height: 100%; display: flex; flex-direction: column;
            justify-content: space-between; pointer-events: none;
        }

        .top-bar, .bottom-bar {
            pointer-events: auto; padding: 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .top-bar { background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%); }
        .bottom-bar {
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
            padding-bottom: 40px;
        }

        .shutter-btn {
            width: 76px; height: 76px; border-radius: 50%;
            background-color: white; border: 4px solid transparent;
            box-shadow: 0 0 0 4px white inset, 0 0 0 2px rgba(255,255,255,0.5);
            transition: all 0.1s ease; cursor: pointer;
        }
        .shutter-btn:active { transform: scale(0.9); background-color: #ddd; }

        .icon-btn, .text-btn {
            color: white; background: rgba(0, 0, 0, 0.5);
            border-radius: 50%; width: 44px; height: 44px;
            display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px); cursor: pointer;
            transition: background 0.2s; border: 1px solid rgba(255,255,255,0.2);
        }
        .text-btn { border-radius: 20px; width: auto; padding: 0 16px; font-weight: 600; font-size: 0.9rem; }
        .icon-btn:hover, .text-btn:hover { background: rgba(0, 0, 0, 0.7); }

        .phi-grid, .fibonacci-spiral { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
        .phi-grid.active, .fibonacci-spiral.active { display: block; }
        
        .phi-line-v1, .phi-line-v2 { position: absolute; top: 0; bottom: 0; width: 1px; background-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .phi-line-v1 { left: 38.2%; } .phi-line-v2 { left: 61.8%; }
        .phi-line-h1, .phi-line-h2 { position: absolute; left: 0; right: 0; height: 1px; background-color: rgba(255, 255, 255, 0.6); box-shadow: 0 0 2px rgba(0,0,0,0.5); }
        .phi-line-h1 { top: 38.2%; } .phi-line-h2 { top: 61.8%; }

        .intersection-point {
            position: absolute; width: 6px; height: 6px; background-color: #fbbf24; border-radius: 50%;
            transform: translate(-50%, -50%); box-shadow: 0 0 4px rgba(0,0,0,0.8); z-index: 15;
        }
        .pt-1 { top: 38.2%; left: 38.2%; } .pt-2 { top: 38.2%; left: 61.8%; }
        .pt-3 { top: 61.8%; left: 38.2%; } .pt-4 { top: 61.8%; left: 61.8%; }

        .fibonacci-spiral svg { width: 100%; height: 100%; opacity: 0.6; filter: drop-shadow(0px 0px 1px rgba(0,0,0,1)); }

        .guidance-panel {
            pointer-events: auto; position: absolute; bottom: 140px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); color: white; padding: 14px 20px;
            border-radius: 16px; text-align: left; width: 85%; max-width: 400px; font-size: 0.95rem; line-height: 1.5;
            border: 1px solid rgba(255, 215, 0, 0.3); transition: opacity 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        #preview-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 50; flex-direction: column;
        }
        #preview-image { flex: 1; width: 100%; object-fit: contain; }
        
        .flash-effect {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: white; opacity: 0; z-index: 40; pointer-events: none;
        }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }

        /* Hiệu ứng Chiều sâu */
        .depth-effect-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            mask-image: radial-gradient(ellipse at center, transparent 25%, black 70%);
            -webkit-mask-image: radial-gradient(ellipse at center, transparent 25%, black 70%);
            pointer-events: none; z-index: 5; display: none;
        }
        .depth-effect-overlay.active { display: block; }
        .btn-active { color: #fbbf24 !important; border-color: #fbbf24 !important; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="view-finder">
        <video id="camera-feed" autoplay playsinline muted></video>
        <div id="depth-overlay" class="depth-effect-overlay"></div>
        <div id="flash-overlay" class="flash-effect"></div>

        <div class="overlay-layer">
            <div id="grid-phi" class="phi-grid active">
                <div class="phi-line-v1"></div><div class="phi-line-v2"></div>
                <div class="phi-line-h1"></div><div class="phi-line-h2"></div>
                <div class="intersection-point pt-1"></div><div class="intersection-point pt-2"></div>
                <div class="intersection-point pt-3"></div><div class="intersection-point pt-4"></div>
            </div>
            <div id="grid-spiral" class="fibonacci-spiral">
                <svg viewBox="0 0 1618 1000" preserveAspectRatio="none">
                    <path d="M 1618 1000 A 1000 1000 0 0 0 618 0 A 618 618 0 0 0 0 618 A 382 382 0 0 0 382 1000 A 236 236 0 0 0 618 764 A 146 146 0 0 0 472 618" fill="none" stroke="#fbbf24" stroke-width="4" />
                    <rect x="0" y="0" width="1618" height="1000" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                </svg>
            </div>
        </div>
    </div>

    <div class="controls-layer">
        <div class="top-bar">
            <!-- Nút Tip Chuyên Gia -->
            <div class="icon-btn" onclick="showRandomTip()" title="Mẹo Chụp Ảnh">
                <i data-lucide="lightbulb" class="w-5 h-5 text-yellow-400"></i>
            </div>
            <div class="flex gap-3">
                <div id="depth-btn" class="icon-btn" onclick="toggleDepthMode()" title="Chân dung (Xóa phông)">
                    <i data-lucide="aperture" class="w-5 h-5"></i>
                </div>
                <div id="ratio-btn" class="text-btn" onclick="cycleRatio()" title="Đổi tỉ lệ">FULL</div>
                <div class="icon-btn" onclick="cycleGrid()" title="Đổi Lưới">
                    <i data-lucide="grid-3x3" class="w-5 h-5"></i>
                </div>
            </div>
        </div>

        <div id="guidance-panel" class="guidance-panel">
            <h3 id="guidance-title" class="font-bold text-yellow-400 mb-2 flex items-center gap-2 border-b border-gray-600 pb-1">
                <i data-lucide="camera" class="w-4 h-4"></i> Khởi động máy ảnh
            </h3>
            <p id="guidance-text" class="text-sm text-gray-200">
                Hãy đặt chủ thể chính vào các <span class="text-yellow-400 font-bold">điểm vàng</span> để bức ảnh tự nhiên và hút mắt nhất.
            </p>
        </div>

        <div class="bottom-bar">
            <div class="w-14 h-14 rounded-lg bg-gray-800 border-2 border-gray-500 overflow-hidden" id="last-photo-preview" style="display:none; cursor:pointer;" onclick="showModal()">
                <img id="thumb-img" src="" class="w-full h-full object-cover">
            </div>
            <div class="w-14 h-14" id="last-photo-placeholder" style="display:block;"></div>
            
            <div class="shutter-btn" onclick="takePhoto()"></div>

            <div class="icon-btn w-14 h-14" onclick="switchCamera()">
                <i data-lucide="switch-camera" class="w-6 h-6"></i>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div id="preview-modal">
    <div class="p-4 flex justify-between items-center bg-black bg-opacity-90 text-white w-full">
        <button onclick="closeModal()" class="text-lg flex items-center gap-2 px-2 py-1"><i data-lucide="chevron-left"></i> Đóng</button>
        <button onclick="savePhoto()" class="bg-yellow-500 text-black px-4 py-2 rounded-full font-bold text-sm flex items-center gap-2">LƯU ẢNH <i data-lucide="download" class="w-4 h-4"></i></button>
    </div>
    <div class="flex-1 flex justify-center items-center overflow-hidden">
        <img id="preview-image" src="" alt="Captured">
    </div>
</div>

<canvas id="photo-canvas" style="display: none;"></canvas>

<script>
    lucide.createIcons();

    let stream = null;
    let currentFacingMode = 'environment';
    const videoElement = document.getElementById('camera-feed');
    const viewFinder = document.getElementById('view-finder');
    const canvasElement = document.getElementById('photo-canvas');
    
    let currentGrid = 1;
    let guidanceVisible = true;
    let capturedDataUrl = "";
    let guidanceTimeout = null;
    let isDepthMode = false;

    const ratios = [
        { name: 'FULL', value: 'full' },
        { name: '4:3', value: 4/3 },
        { name: '16:9', value: 16/9 },
        { name: '1:1', value: 1 }
    ];
    let currentRatioIndex = 0;

    // --- KHO TÀNG MẸO NHIẾP ẢNH ---
    const expertTips = [
        "<b>Ánh sáng là tất cả:</b> Tận dụng 'Giờ vàng' (lúc bình minh hoặc hoàng hôn) để có ánh sáng vệt đổ dài mềm mại, ấm áp.",
        "<b>Khoảng trống không gian (Lead Room):</b> Nếu chủ thể đang nhìn hoặc bước đi về một hướng, hãy chừa không gian phía trước họ nhiều hơn phía sau lưng.",
        "<b>Đường dẫn (Leading Lines):</b> Tìm kiếm con đường, hàng rào, vạch kẻ đường để tạo thành một 'mũi tên' thị giác dẫn mắt thẳng vào chủ thể chính.",
        "<b>Khung trong khung (Framing):</b> Hãy dùng cành cây, ô cửa sổ, vòm cổng để làm một khung viền tự nhiên bao quanh chủ thể, tạo độ sâu 3D.",
        "<b>Dọn dẹp hậu cảnh:</b> Trước khi bấm máy, hãy quét mắt nhìn phông nền. Tránh để các đường dây điện hoặc nhánh cây 'mọc' ngang đầu chủ thể.",
        "<b>Thay đổi góc độ (Low Angle):</b> Đừng chỉ đứng chụp ngang tầm mắt. Hãy thử ngồi thấp xuống, hắt máy ảnh lên để chủ thể trông uy nghi, chân dài và nổi bật trên nền trời.",
        "<b>Tiền cảnh mờ ảo (Foreground):</b> Đưa ống kính sát vào một chiếc lá, bông hoa hoặc mặt bàn để tạo một lớp tiền cảnh mờ, bức hình sẽ lập tức có chiều sâu điện ảnh.",
        "<b>Tương phản màu sắc:</b> Đặt chủ thể mặc đồ màu nóng (Cam, Đỏ) nổi bật trên phông nền màu lạnh (Xanh da trời, Xanh lá cây) để tạo sức hút thị giác.",
        "<b>Góc chụp Top-down (Flat Lay):</b> Khi chụp đồ ăn hoặc sản phẩm, hãy thử chuyển sang tỉ lệ 1:1, đưa máy ảnh thẳng góc 90 độ từ trên xuống để tạo sự sắp đặt gọn gàng.",
        "<b>Đừng quên ánh mắt:</b> Khi chụp chân dung, điểm lấy nét (chấm vàng) bắt buộc phải nằm ở 'Con mắt' gần với ống kính nhất của người mẫu."
    ];

    const gridTips = {
        0: "<b>Chế độ Tự do:</b> Không có lưới, hãy tự cảm nhận không gian, ánh sáng và góc độ theo bản năng nghệ thuật của bạn.",
        1: "<b>Phi Grid (1:1.618):</b> Đặt mắt người (chân dung) hoặc đường chân trời (phong cảnh) vào các <span class='text-yellow-400 font-bold'>điểm vàng</span> để ảnh cân bằng tuyệt đối.",
        2: "<b>Xoắn Ốc Fibonacci:</b> Đặt chi tiết chủ đạo vào tâm xoắn ốc, để các chi tiết phụ trôi lượn theo đường cong lớn ra ngoài."
    };

    const ratioTips = {
        'FULL': "<b>Tỉ lệ FULL:</b> Tận dụng toàn bộ cảm biến. Phù hợp chụp không gian kiến trúc rộng, hoặc các góc ảnh sáng tạo bứt phá.",
        '4:3': "<b>Tỉ lệ 4:3:</b> Khung hình nhiếp ảnh kinh điển. Hoàn hảo để chụp chân dung, ảnh đời thường (street style) và phong cảnh tiêu chuẩn.",
        '16:9': "<b>Tỉ lệ 16:9:</b> Khung hình điện ảnh (Cinematic). Rất tuyệt để chụp phong cảnh rộng bao la hoặc làm ảnh bìa, video xu hướng.",
        '1:1': "<b>Tỉ lệ 1:1 (Vuông):</b> Trọng tâm hội tụ mạnh mẽ ở chính giữa. Tốt nhất cho ảnh tĩnh vật, đồ ăn, và mạng xã hội Instagram."
    };

    // Hàm gọi Mẹo chuyên gia
    function showRandomTip() {
        const randomTip = expertTips[Math.floor(Math.random() * expertTips.length)];
        document.getElementById('guidance-title').innerHTML = '<i data-lucide="lightbulb" class="w-5 h-5 text-yellow-400"></i> Tip Nhiếp Ảnh Chuyên Sâu';
        document.getElementById('guidance-text').innerHTML = randomTip;
        lucide.createIcons();
        showGuidance(10000); // Mẹo chuyên sâu hiện lâu hơn một chút (10s)
    }

    function toggleDepthMode() {
        isDepthMode = !isDepthMode;
        document.getElementById('depth-overlay').classList.toggle('active', isDepthMode);
        document.getElementById('depth-btn').classList.toggle('btn-active', isDepthMode);
        
        document.getElementById('guidance-title').innerHTML = '<i data-lucide="aperture" class="w-4 h-4 text-yellow-400"></i> Chế Độ Chân Dung';
        document.getElementById('guidance-text').innerHTML = isDepthMode 
            ? "<b>Xóa Phông (Bokeh):</b> Giữ điện thoại <b>DỌC</b>, đưa khuôn mặt vào <b>TRUNG TÂM</b> khung hình. Viền sẽ được làm mờ để tạo hiệu ứng nổi bật chủ thể." 
            : "Đã tắt hiệu ứng chiều sâu.";
        
        lucide.createIcons();
        showGuidance();
    }

    async function startCamera() {
        if (stream) stream.getTracks().forEach(track => track.stop());

        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            document.getElementById('guidance-title').innerHTML = '<i data-lucide="shield-alert" class="w-4 h-4 text-red-500"></i> Lỗi Bảo Mật';
            document.getElementById('guidance-text').innerHTML = "<span class='text-red-400'>Trình duyệt chặn Camera. Bạn hãy đảm bảo đang dùng đường dẫn có chứa HTTPS hoặc test trên Localhost nhé.</span>";
            showGuidance(15000);
            return;
        }

        const highResConstraints = { video: { facingMode: currentFacingMode, width: { ideal: 4096 }, height: { ideal: 2160 } }, audio: false };
        const basicConstraints = { video: { facingMode: currentFacingMode }, audio: false };
        const minimalConstraints = { video: true, audio: false };

        try {
            stream = await navigator.mediaDevices.getUserMedia(highResConstraints);
        } catch (err) {
            try { stream = await navigator.mediaDevices.getUserMedia(basicConstraints); } 
            catch (fallbackErr) {
                try { stream = await navigator.mediaDevices.getUserMedia(minimalConstraints); } 
                catch (finalErr) {
                    document.getElementById('guidance-title').innerHTML = '<i data-lucide="alert-triangle" class="w-4 h-4 text-red-500"></i> Lỗi Camera';
                    document.getElementById('guidance-text').innerHTML = "<span class='text-red-400'>Không thể truy cập. Hãy cấp quyền Camera cho trang web.</span>";
                    showGuidance(); return;
                }
            }
        }

        videoElement.srcObject = stream;
        videoElement.style.transform = currentFacingMode === 'user' ? 'scaleX(-1)' : 'scaleX(1)';
        videoElement.play().catch(e => console.error("Lỗi play video:", e));
        videoElement.onloadedmetadata = () => { updateViewFinder(); };
    }

    function switchCamera() {
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        startCamera();
    }

    function cycleGrid() {
        currentGrid = (currentGrid + 1) % 3;
        document.getElementById('grid-phi').classList.toggle('active', currentGrid === 1);
        document.getElementById('grid-spiral').classList.toggle('active', currentGrid === 2);
        
        document.getElementById('guidance-title').innerHTML = '<i data-lucide="grid" class="w-4 h-4 text-yellow-400"></i> Mẹo Bố Cục Lưới';
        document.getElementById('guidance-text').innerHTML = gridTips[currentGrid];
        lucide.createIcons(); showGuidance();
    }

    function cycleRatio() {
        currentRatioIndex = (currentRatioIndex + 1) % ratios.length;
        const currentRatioName = ratios[currentRatioIndex].name;
        document.getElementById('ratio-btn').innerText = currentRatioName;
        updateViewFinder();

        document.getElementById('guidance-title').innerHTML = '<i data-lucide="crop" class="w-4 h-4 text-yellow-400"></i> Mẹo Tỉ Lệ Hình';
        document.getElementById('guidance-text').innerHTML = ratioTips[currentRatioName];
        lucide.createIcons(); showGuidance();
    }

    function showGuidance(duration = 6000) {
        const panel = document.getElementById('guidance-panel');
        guidanceVisible = true;
        panel.style.opacity = "1";
        panel.style.pointerEvents = "auto";

        if (guidanceTimeout) clearTimeout(guidanceTimeout);
        guidanceTimeout = setTimeout(() => {
            guidanceVisible = false;
            panel.style.opacity = "0";
            panel.style.pointerEvents = "none";
        }, duration);
    }

    function updateViewFinder() {
        const ratioObj = ratios[currentRatioIndex];
        const winW = window.innerWidth;
        const winH = window.innerHeight;
        const isPortrait = winH > winW; 

        let targetW, targetH;

        if (ratioObj.value === 'full') {
            targetW = winW; targetH = winH;
        } else {
            let ratio = ratioObj.value;
            if (isPortrait && ratio !== 1) { ratio = 1 / ratio; }

            targetW = winW; targetH = winW / ratio;
            if (targetH > winH) { targetH = winH; targetW = winH * ratio; }
        }

        viewFinder.style.width = `${targetW}px`;
        viewFinder.style.height = `${targetH}px`;
    }

    window.addEventListener('resize', updateViewFinder);

    function takePhoto() {
        const flash = document.getElementById('flash-overlay');
        flash.style.animation = 'none'; flash.offsetHeight; 
        flash.style.animation = 'flashAnim 0.5s forwards';

        if (!videoElement.videoWidth) return;

        const vidW = videoElement.videoWidth, vidH = videoElement.videoHeight, vidRatio = vidW / vidH;
        const vfW = viewFinder.offsetWidth, vfH = viewFinder.offsetHeight, vfRatio = vfW / vfH;

        let cropW, cropH, startX, startY;
        if (vidRatio > vfRatio) {
            cropH = vidH; cropW = vidH * vfRatio;
            startX = (vidW - cropW) / 2; startY = 0;
        } else {
            cropW = vidW; cropH = vidW / vfRatio;
            startX = 0; startY = (vidH - cropH) / 2;
        }

        canvasElement.width = cropW; canvasElement.height = cropH;
        const ctx = canvasElement.getContext('2d');
        
        if (currentFacingMode === 'user') { ctx.translate(cropW, 0); ctx.scale(-1, 1); }
        
        ctx.drawImage(videoElement, startX, startY, cropW, cropH, 0, 0, cropW, cropH);

        if (isDepthMode) {
            const offCanvas = document.createElement('canvas');
            offCanvas.width = cropW; offCanvas.height = cropH;
            const offCtx = offCanvas.getContext('2d');
            
            const blurAmount = Math.max(cropW, cropH) * 0.015; 
            offCtx.filter = `blur(${blurAmount}px)`;
            offCtx.drawImage(videoElement, startX, startY, cropW, cropH, 0, 0, cropW, cropH);
            offCtx.filter = 'none';

            offCtx.globalCompositeOperation = 'destination-out';
            const minDim = Math.min(cropW, cropH);
            const grad = offCtx.createRadialGradient(cropW/2, cropH/2, minDim * 0.25, cropW/2, cropH/2, minDim * 0.75);
            grad.addColorStop(0, 'rgba(0,0,0,1)'); 
            grad.addColorStop(1, 'rgba(0,0,0,0)'); 
            
            offCtx.fillStyle = grad;
            offCtx.fillRect(0, 0, cropW, cropH);

            ctx.drawImage(offCanvas, 0, 0);
        }

        capturedDataUrl = canvasElement.toDataURL('image/jpeg', 0.95);

        document.getElementById('last-photo-placeholder').style.display = 'none';
        document.getElementById('last-photo-preview').style.display = 'block';
        document.getElementById('thumb-img').src = capturedDataUrl;
    }

    function showModal() {
        if (!capturedDataUrl) return;
        document.getElementById('preview-image').src = capturedDataUrl;
        document.getElementById('preview-modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('preview-modal').style.display = 'none'; }

    function savePhoto() {
        if (!capturedDataUrl) return;
        const link = document.createElement('a');
        link.download = `GoldenRatio_${ratios[currentRatioIndex].name.replace(':','x')}_${new Date().getTime()}.jpg`;
        link.href = capturedDataUrl; link.click(); closeModal();
    }

    window.onload = () => {
        updateViewFinder();
        startCamera();
        // Hiện mẹo khởi động 8 giây
        setTimeout(() => { showRandomTip(); }, 3000); 
    };
</script>
</body>
</html>
